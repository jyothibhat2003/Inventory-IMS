<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock — Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 260px; background: #1e293b; border-right: 1px solid rgba(255,255,255,0.06); padding: 24px 0; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 12px; }
        .sidebar-header h1 { font-size: 1.15rem; font-weight: 700; background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-header .version { font-size: 0.7rem; color: #64748b; margin-top: 4px; }
        .nav-section { padding: 0 12px; flex: 1; }
        .nav-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; padding: 16px 12px 8px; font-weight: 600; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; color: #94a3b8; text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; margin-bottom: 2px; }
        .nav-link:hover { background: rgba(129,140,248,0.1); color: #c7d2fe; }
        .nav-link.active { background: rgba(129,140,248,0.15); color: #a5b4fc; }
        .nav-icon { width: 20px; text-align: center; }
        .main { margin-left: 260px; padding: 32px 40px; min-height: 100vh; }
        .breadcrumb { font-size: 0.8rem; color: #64748b; margin-bottom: 8px; }
        .breadcrumb a { color: #818cf8; text-decoration: none; }
        .page-header { margin-bottom: 24px; }
        .page-header h2 { font-size: 1.75rem; font-weight: 700; color: #f1f5f9; }
        .data-table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); }
        .data-table thead { background: rgba(129,140,248,0.08); }
        .data-table th { padding: 14px 18px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .data-table td { padding: 14px 18px; font-size: 0.85rem; color: #cbd5e1; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .data-table tr:hover td { background: rgba(129,140,248,0.04); }
        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-state h3 { font-size: 1.1rem; color: #94a3b8; margin-bottom: 8px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; }
        .badge-cyan { background: rgba(34,211,238,0.15); color: #22d3ee; }
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 20px; } }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header"><h1>📦 Inventory IMS</h1><div class="version">v1.0.0</div></div>
        <div class="nav-section">
            <div class="nav-label">Main</div>
            <a href="/" class="nav-link"><span class="nav-icon">🏠</span>Dashboard</a>
            <div class="nav-label">Manage</div>
            <a href="/web/categories" class="nav-link"><span class="nav-icon">📂</span>Categories</a>
            <a href="/web/products" class="nav-link"><span class="nav-icon">📦</span>Products</a>
            <a href="/web/stock" class="nav-link active"><span class="nav-icon">🏪</span>Stock</a>
            <a href="/web/suppliers" class="nav-link"><span class="nav-icon">🚚</span>Suppliers</a>
            <a href="/web/invoices" class="nav-link"><span class="nav-icon">🧾</span>Invoices</a>
            <a href="/web/pricing" class="nav-link"><span class="nav-icon">💲</span>Pricing</a>
        </div>
    </nav>
    <main class="main">
        <div class="breadcrumb"><a href="/">Dashboard</a> / Stock</div>
        <div class="page-header"><h2>🏪 Stock</h2></div>
        <div th:if="${#lists.isEmpty(stocks)}">
            <div class="empty-state">
                <div class="icon">🏪</div>
                <h3>No stock entries yet</h3>
                <p>Use the REST API <code>POST /stocks</code> to add stock entries.</p>
            </div>
        </div>
        <table class="data-table" th:unless="${#lists.isEmpty(stocks)}">
            <thead>
                <tr><th>Ref ID</th><th>Quantity</th><th>Branch</th><th>Stock Date</th><th>Created By</th><th>Created Date</th></tr>
            </thead>
            <tbody>
                <tr th:each="stk : ${stocks}">
                    <td><span class="badge badge-cyan" th:text="${stk.refId}"></span></td>
                    <td th:text="${stk.quantity}"></td>
                    <td th:text="${stk.branchId}"></td>
                    <td th:text="${stk.dateStock}"></td>
                    <td th:text="${stk.createdUser}"></td>
                    <td th:text="${stk.createdDateTime}"></td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
