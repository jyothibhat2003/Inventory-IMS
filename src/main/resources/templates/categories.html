<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories — Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 260px; background: #1e293b; border-right: 1px solid rgba(255,255,255,0.06); padding: 24px 0; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 12px; }
        .sidebar-header h1 { font-size: 1.15rem; font-weight: 700; background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-header .version { font-size: 0.7rem; color: #64748b; margin-top: 4px; font-weight: 500; }
        .nav-section { padding: 0 12px; flex: 1; }
        .nav-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; padding: 16px 12px 8px; font-weight: 600; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; color: #94a3b8; text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; margin-bottom: 2px; }
        .nav-link:hover { background: rgba(129,140,248,0.1); color: #c7d2fe; }
        .nav-link.active { background: rgba(129,140,248,0.15); color: #a5b4fc; }
        .nav-icon { width: 20px; text-align: center; font-size: 1rem; }

        .main { margin-left: 260px; padding: 32px 40px; min-height: 100vh; }
        .page-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h2 { font-size: 1.75rem; font-weight: 700; color: #f1f5f9; }
        .breadcrumb { font-size: 0.8rem; color: #64748b; margin-bottom: 8px; }
        .breadcrumb a { color: #818cf8; text-decoration: none; }

        .data-table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); }
        .data-table thead { background: rgba(129,140,248,0.08); }
        .data-table th { padding: 14px 18px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .data-table td { padding: 14px 18px; font-size: 0.85rem; color: #cbd5e1; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .data-table tr:hover td { background: rgba(129,140,248,0.04); }
        .data-table tr:last-child td { border-bottom: none; }

        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-state h3 { font-size: 1.1rem; color: #94a3b8; margin-bottom: 8px; }
        .empty-state p { font-size: 0.85rem; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; }
        .badge-purple { background: rgba(129,140,248,0.15); color: #a5b4fc; }
        .badge-green { background: rgba(34,197,94,0.15); color: #4ade80; }
        .badge-red { background: rgba(239,68,68,0.15); color: #ef4444; cursor: pointer; border: none; padding: 6px 12px; }

        .btn-primary { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
        .btn-primary:hover { background: #2563eb; }

        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; padding: 32px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-header h3 { font-size: 1.25rem; }
        .close-btn { background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: #cbd5e1; }
        .form-group input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; }
        .form-group input:focus { border-color: #3b82f6; outline: none; }
        
        .action-flex { display: flex; gap: 8px; }

        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 20px; } }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>📦 Inventory IMS</h1>
            <div class="version">v1.0.0</div>
        </div>
        <div class="nav-section">
            <div class="nav-label">Main</div>
            <a href="/" class="nav-link"><span class="nav-icon">🏠</span>Dashboard</a>
            <div class="nav-label">Manage</div>
            <a href="/web/categories" class="nav-link active"><span class="nav-icon">📂</span>Categories</a>
            <a href="/web/products" class="nav-link"><span class="nav-icon">📦</span>Products</a>
            <a href="/web/stock" class="nav-link"><span class="nav-icon">🏪</span>Stock</a>
            <a href="/web/suppliers" class="nav-link"><span class="nav-icon">🚚</span>Suppliers</a>
            <a href="/web/invoices" class="nav-link"><span class="nav-icon">🧾</span>Invoices</a>
            <a href="/web/pricing" class="nav-link"><span class="nav-icon">💲</span>Pricing</a>
        </div>
    </nav>

    <main class="main">
        <div class="breadcrumb"><a href="/">Dashboard</a> / Categories</div>
        <div class="page-header">
            <h2>📂 Categories</h2>
            <button class="btn-primary" onclick="openModal()">+ Add Category</button>
        </div>

        <div th:if="${#lists.isEmpty(categories)}">
            <div class="empty-state">
                <div class="icon">📂</div>
                <h3>No categories yet</h3>
                <p>Use the REST API <code>POST /categories</code> to add your first category.</p>
            </div>
        </div>

        <table class="data-table" th:unless="${#lists.isEmpty(categories)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Created By</th>
                    <th>Created Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cat : ${categories}">
                    <td><span class="badge badge-purple" th:text="${cat.categoryId}"></span></td>
                    <td th:text="${cat.categoryName}"></td>
                    <td th:text="${cat.createdUser}"></td>
                    <td th:text="${cat.createdDateTime}"></td>
                    <td>
                        <button class="badge badge-red" th:onclick="'deleteCategory(' + ${cat.categoryId} + ')'">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Add Category Modal -->
        <div class="modal" id="addModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Add New Category</h3>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <form id="addForm" onsubmit="submitCategory(event)">
                    <div class="form-group">
                        <label>Category Name</label>
                        <input type="text" id="categoryName" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Save Category</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        function openModal() { document.getElementById('addModal').classList.add('active'); }
        function closeModal() { document.getElementById('addModal').classList.remove('active'); document.getElementById('addForm').reset(); }

        async function submitCategory(e) {
            e.preventDefault();
            const name = document.getElementById('categoryName').value;
            const data = { categoryName: name };

            const res = await fetch('/categories', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(res.ok) {
                closeModal();
                window.location.reload();
            } else {
                alert('Error adding category');
            }
        }

        async function deleteCategory(id) {
            if(!confirm('Are you sure you want to delete this category?')) return;
            const res = await fetch('/categories/' + id, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ categoryId: id })
            });

            if(res.ok) {
                window.location.reload();
            } else {
                alert('Error deleting category');
            }
        }
    </script>
</body>
</html>
